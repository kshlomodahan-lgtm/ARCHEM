<div class="login-page">
  <div class="login-card">

    <div class="login-brand" dir="ltr">
      <span class="brand-arc">ARC</span><span class="brand-hem">HEM</span>
    </div>
    <div class="login-subtitle">מערכת עמלות</div>

    <form class="login-form" (ngSubmit)="login()">

      <div class="field-group">
        <label class="field-label">שם משתמש</label>
        <input class="field-input" type="text" [(ngModel)]="username" name="username"
               placeholder="הזן שם משתמש" autocomplete="username" />
      </div>

      <div class="field-group">
        <label class="field-label">סיסמה</label>
        <div class="pass-wrap">
          <input class="field-input pass-input" [type]="showPass ? 'text' : 'password'"
                 [(ngModel)]="password" name="password"
                 placeholder="הזן סיסמה" autocomplete="current-password" />
          <button type="button" class="pass-eye" (click)="showPass = !showPass" tabindex="-1">
            <span class="material-icons">{{ showPass ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      @if (error()) {
        <div class="login-error">{{ error() }}</div>
      }

      <button type="submit" class="btn-login" [disabled]="loading()">
        @if (loading()) { <span class="btn-spinner"></span> }
        כניסה למערכת
      </button>

    </form>
  </div>
</div>
